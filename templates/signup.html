{% extends 'base.html' %}

{% block content %}
<div class="flex-center" style="min-height: calc(100vh - 4rem); background: var(--secondary);">
    <div style="max-width: 480px; width: 100%; padding: 1rem;">
        <a href="/" style="display: flex; align-items: center; color: var(--muted); text-decoration: none; margin-bottom: 1.5rem;">
            <i data-lucide="arrow-left" style="width: 16px; margin-right: 8px;"></i> Back
        </a>
        
        <div class="card">
            <h1 style="font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem;">Join Unity Circles</h1>
            <p style="color: var(--muted); margin-bottom: 2rem;">Start your mentorship journey today</p>

            <form id="signupForm" style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                    <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username</label>
                    <input type="text" id="username" name="username" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 1rem;">
                </div>

                <div>
                    <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email</label>
                    <input type="email" id="email" name="email" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 1rem;">
                </div>

                <div>
                    <label for="first_name" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">First Name</label>
                    <input type="text" id="first_name" name="first_name" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 1rem;">
                </div>

                <div>
                    <label for="last_name" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Last Name</label>
                    <input type="text" id="last_name" name="last_name" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 1rem;">
                </div>

                <div>
                    <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                    <input type="password" id="password" name="password" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 1rem;">
                </div>

                <div id="errorMessage" style="color: #dc2626; display: none; padding: 0.75rem; background: #fee2e2; border-radius: 0.5rem;"></div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; margin-top: 1rem; background: var(--primary); color: white; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer;">
                    Create Account
                </button>

                <p style="text-align: center; color: var(--muted);">
                    Already have an account? <a href="/login/" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign In</a>
                </p>
            </form>
        </div>
    </div>
</div>

<script>
const API_BASE_URL = 'http://127.0.0.1:8000';

document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        first_name: document.getElementById('first_name').value,
        last_name: document.getElementById('last_name').value,
    };

    try {
        const response = await fetch(`${API_BASE_URL}/api/auth/register/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (response.ok) {
            alert('Account created! Redirecting to login...');
            window.location.href = '/login/';
        } else {
            const errorMsg = data.username ? data.username[0] : data.email ? data.email[0] : 'Signup failed';
            document.getElementById('errorMessage').textContent = errorMsg;
            document.getElementById('errorMessage').style.display = 'block';
        }
    } catch (error) {
        console.error('Error:', error);
        document.getElementById('errorMessage').textContent = 'Network error. Please try again.';
        document.getElementById('errorMessage').style.display = 'block';
    }
});
</script>
{% endblock %}
